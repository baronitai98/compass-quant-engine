services:
  - type: web
    name: compass-quant-engine
    runtime: python
    plan: free
    pythonVersion: "3.12.7"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: QUANT_SHARED_SECRET
        sync: false
